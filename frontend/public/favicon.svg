<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Vibrant rounded tile background for maximum visibility in dark & light tabs -->
  <rect width="64" height="64" rx="16" fill="#10B981"/>
  
  <!-- White Vector Cutout Arrow Icon -->
  <g fill="#FFFFFF">
    <!-- Top Speed Line -->
    <rect x="14" y="16" width="12" height="4" rx="2"/>
    <rect x="28" y="16" width="10" height="4" rx="2"/>
    
    <!-- Mid Speed Line -->
    <rect x="10" y="24" width="16" height="4" rx="2"/>
    
    <!-- Solid Forward Arrow -->
    <path d="M 38 12 L 56 32 L 38 52 L 38 40 L 26 40 L 26 24 L 38 24 Z"/>
    
    <!-- Lower Speed Lines -->
    <rect x="8" y="32" width="16" height="4" rx="2"/>
    <rect x="10" y="40" width="14" height="4" rx="2"/>
    <rect x="14" y="48" width="18" height="4" rx="2"/>
  </g>
  
  <!-- Transparent Cutout Lightning Accent -->
  <path d="M 37 16 L 52 32 L 38 32 L 42 24 L 35 24 Z" fill="#10B981"/>
</svg>